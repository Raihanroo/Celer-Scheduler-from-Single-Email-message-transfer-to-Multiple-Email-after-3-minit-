<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Scheduler - Multiple Email পাঠান</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        .email-input-container {
            position: relative;
        }
        .email-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
            min-height: 50px;
        }
        .email-tag {
            background: #667eea;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .email-tag button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-schedule {
            background: #667eea;
            color: white;
        }
        .btn-schedule:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-immediate {
            background: #48bb78;
            color: white;
        }
        .btn-immediate:hover {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.4);
        }
        .response {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .response.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .response.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info-box {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        .info-box h3 {
            color: #667eea;
            margin-bottom: 8px;
        }
        .info-box p {
            color: #555;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 Email Scheduler</h1>
        <p class="subtitle">Multiple emails এ একসাথে mail পাঠান</p>

        <div class="info-box">
            <h3>কিভাবে ব্যবহার করবেন?</h3>
            <p>
                ✅ Email addresses টাইপ করে Enter চাপুন<br>
                ✅ Multiple emails যোগ করতে পারবেন<br>
                ✅ "Schedule Email" - নির্দিষ্ট interval এ automatic mail<br>
                ✅ "Send Now" - এখনই mail পাঠান
            </p>
        </div>

        <form id="emailForm">
            <div class="form-group">
                <label for="emailInput">Email Addresses (Enter চাপুন প্রতিটি email এর পর)</label>
                <input type="email" id="emailInput" placeholder="example@email.com" />
                <div class="email-tags" id="emailTags"></div>
            </div>

            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" placeholder="Email এর subject লিখুন" required />
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" placeholder="Email এর message লিখুন" required></textarea>
            </div>

            <div class="form-group">
                <label for="interval">Interval (Minutes) - শুধু Schedule এর জন্য</label>
                <input type="number" id="interval" value="3" min="1" />
            </div>

            <div class="btn-group">
                <button type="button" class="btn-schedule" onclick="scheduleEmail()">
                    ⏰ Schedule Email
                </button>
                <button type="button" class="btn-immediate" onclick="sendImmediate()">
                    🚀 Send Now
                </button>
            </div>
        </form>

        <div id="response" class="response"></div>
    </div>

    <script>
        let emails = [];

        // Email input এ Enter চাপলে email add হবে
        document.getElementById('emailInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                addEmail();
            }
        });

        function addEmail() {
            const input = document.getElementById('emailInput');
            const email = input.value.trim();
            
            if (email && validateEmail(email) && !emails.includes(email)) {
                emails.push(email);
                renderEmailTags();
                input.value = '';
            } else if (emails.includes(email)) {
                showResponse('এই email টি already যোগ করা আছে!', 'error');
            } else if (!validateEmail(email)) {
                showResponse('সঠিক email address দিন!', 'error');
            }
        }

        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function removeEmail(email) {
            emails = emails.filter(e => e !== email);
            renderEmailTags();
        }

        function renderEmailTags() {
            const container = document.getElementById('emailTags');
            container.innerHTML = emails.map(email => `
                <div class="email-tag">
                    ${email}
                    <button onclick="removeEmail('${email}')" type="button">×</button>
                </div>
            `).join('');
        }

        async function scheduleEmail() {
            if (emails.length === 0) {
                showResponse('অন্তত একটি email address যোগ করুন!', 'error');
                return;
            }

            const data = {
                emails: emails,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value,
                interval_minutes: parseInt(document.getElementById('interval').value)
            };

            try {
                const response = await fetch('/api/schedule-email/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                if (response.ok) {
                    showResponse(`✅ Success! ${emails.length} টি email এ প্রতি ${data.interval_minutes} মিনিট পর mail যাবে।`, 'success');
                } else {
                    showResponse('❌ Error: ' + (result.error || 'Something went wrong'), 'error');
                }
            } catch (error) {
                showResponse('❌ Network error: ' + error.message, 'error');
            }
        }

        async function sendImmediate() {
            if (emails.length === 0) {
                showResponse('অন্তত একটি email address যোগ করুন!', 'error');
                return;
            }

            const data = {
                emails: emails,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value
            };

            try {
                const response = await fetch('/api/send-email/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                if (response.ok) {
                    showResponse(`✅ Success! ${emails.length} টি email এ mail পাঠানো হচ্ছে...`, 'success');
                } else {
                    showResponse('❌ Error: ' + (result.error || 'Something went wrong'), 'error');
                }
            } catch (error) {
                showResponse('❌ Network error: ' + error.message, 'error');
            }
        }

        function showResponse(message, type) {
            const responseDiv = document.getElementById('response');
            responseDiv.textContent = message;
            responseDiv.className = 'response ' + type;
            responseDiv.style.display = 'block';
            
            setTimeout(() => {
                responseDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
